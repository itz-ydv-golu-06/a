<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>IBS Clone (Clean UI)</title>
<style>
  body{margin:0;font-family:Segoe UI,Arial;background:#e9edf2}
  .topbar{background:#e74c3c;color:#fff;padding:8px 12px;display:flex;gap:20px;align-items:center}
  .menu{position:relative;cursor:pointer}
  .dropdown{display:none;position:absolute;top:28px;left:0;background:#fff;color:#000;min-width:200px;border:1px solid #ccc;z-index:10}
  .dropdown div{padding:8px;border-bottom:1px solid #eee}
  .dropdown div:hover{background:#f2f2f2}
  .menu:hover .dropdown{display:block}.layout{display:flex;height:calc(100vh - 40px)} .sidebar{width:220px;background:#2c3e50;color:#fff;padding:10px} .sidebar div{padding:10px;margin:5px 0;background:#34495e;cursor:pointer} .sidebar div:hover{background:#1abc9c}

.main{flex:1;padding:10px} .panel{background:#fff;padding:10px;border-radius:6px;margin-bottom:10px}

.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px} .room{padding:15px;text-align:center;border-radius:6px;color:#fff;font-weight:bold} .vacant{background:#27ae60} .occupied{background:#e74c3c} .dirty{background:#f39c12}

table{width:100%;border-collapse:collapse} th,td{padding:8px;border:1px solid #ddd} input{padding:6px;margin:5px} </style>

</head>
<body><div class="topbar">
  <div class="menu">Front Office
    <div class="dropdown">
      <div onclick="show('checkin')">Check In</div>
      <div onclick="show('checkout')">Check Out</div>
      <div onclick="show('rooms')">Room Calendar</div>
      <div onclick="show('guests')">Search Guest</div>
    </div>
  </div>
  <div>F&B</div>
  <div>Special Services</div>
  <div>Account</div>
  <div>Report</div>
</div><div class="layout"><div class="sidebar">
  <div onclick="show('dashboard')">F1 Occupancy</div>
  <div onclick="show('rooms')">F2 Room Calendar</div>
  <div onclick="show('checkin')">F6 CheckIn</div>
  <div onclick="show('checkout')">F7 CheckOut</div>
</div><div class="main"><div id="dashboard" class="panel"></div><div id="rooms" class="panel" style="display:none">
  <h3>Room Calendar</h3>
  <div class="grid" id="roomGrid"></div>
</div><div id="checkin" class="panel" style="display:none">
  <h3>Check-In</h3>
  <input id="guest" placeholder="Guest Name">
  <input id="roomNo" placeholder="Room No">
  <button onclick="checkIn()">Submit</button>
</div><div id="checkout" class="panel" style="display:none">
  <h3>Check-Out</h3>
  <input id="checkoutRoom" placeholder="Room No">
  <button onclick="checkOut()">Submit</button>
</div><div id="guests" class="panel" style="display:none">
  <h3>Guest List</h3>
  <table id="guestTable"></table>
</div></div>
</div><script>
let rooms = JSON.parse(localStorage.getItem('rooms')) || {};

// init rooms
for(let i=101;i<=110;i++){
  if(!rooms[i]) rooms[i]={status:'vacant'};
}

function save(){localStorage.setItem('rooms',JSON.stringify(rooms));}

function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.style.display='none');
  document.getElementById(id).style.display='block';
  load();
}

function load(){
  let total=Object.keys(rooms).length;
  let occ=Object.values(rooms).filter(r=>r.status==='occupied').length;
  let vac=Object.values(rooms).filter(r=>r.status==='vacant').length;
  let dirty=Object.values(rooms).filter(r=>r.status==='dirty').length;

  document.getElementById('dashboard').innerHTML=`
    <h3>Dashboard</h3>
    Total: ${total} | Occupied: ${occ} | Vacant: ${vac} | Dirty: ${dirty}
  `;

  // grid
  let grid='';
  for(let r in rooms){
    grid+=<div class="room ${rooms[r].status}">${r}</div>;
  }
  document.getElementById('roomGrid').innerHTML=grid;

  // guest table
  let html='<tr><th>Room</th><th>Guest</th></tr>';
  for(let r in rooms){
    if(rooms[r].guest){
      html+=<tr><td>${r}</td><td>${rooms[r].guest}</td></tr>;
    }
  }
  document.getElementById('guestTable').innerHTML=html;
}

function checkIn(){
  let r=roomNo.value;
  let g=guest.value;
  if(!rooms[r]) return alert('Room not found');
  rooms[r]={status:'occupied',guest:g};
  save();load();alert('Checked In');
}

function checkOut(){
  let r=checkoutRoom.value;
  if(!rooms[r]) return alert('Room not found');
  rooms[r]={status:'dirty'};
  save();load();alert('Checked Out');
}

load();
</script></body>
</html>
